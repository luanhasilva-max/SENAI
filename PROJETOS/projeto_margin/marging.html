<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Margin e Padding</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🎮 Margin e Padding — Estilo Gamer</h1>
    </header>

    <main>

    <div class="azul">
        <h2>🎯 Padding: 30px — espaço interno</h2>

        <p>
         O escudo azul cresceu para dentro.
    </p>
     </div>

    <div class="verde">
        <h2>❎ Margin: 30px — espaço externo</h2>

       <p>
         O bloco verde se afastou dos outros.
     </p>
     </div>

     <div class="laranja">
     <h2>🔥 Margin: 20px + Padding: 20px</h2>

     <p>
         Margin afasta por fora. Padding cresce por dentro.
    </p>
 </div>

 </main>

   

</body>
</html>
